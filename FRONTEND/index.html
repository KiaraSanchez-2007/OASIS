<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>OASIS</title>

    <link rel="stylesheet" href="style_v1.css">

</head>

<body>

    <div class="contenedor">

        <!-- ========================= -->
        <!-- CABECERA -->
        <!-- ========================= -->

        <div class="cabecera">

            <div class="titulo">
                🌿 OASIS
            </div>

            <div class="subtitulo">
                Tu aliado para el bienestar universitario
            </div>

            <div class="estado">

                <span class="online"></span>

                Conectado

            </div>

        </div>

        <!-- ========================= -->
        <!-- CHAT -->
        <!-- ========================= -->

        <div id="chat" class="chat"></div>

        <!-- ========================= -->
        <!-- ENTRADA -->
        <!-- ========================= -->

        <div class="entrada">

            <input
                id="texto"
                type="text"
                placeholder="Escribe un mensaje..."
                autofocus
            >

<button id="enviar">
    Enviar
</button>
        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
